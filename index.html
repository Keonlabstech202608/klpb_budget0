<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0010">
    <link rel="apple-touch-icon" href="assets/icon.png">
    <title>KEONLABS — Business Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="introSplash">
    <video id="introVideo" autoplay muted playsinline loop>
        <source src="assets/intro-video.mp4" type="video/mp4">
    </video>
    <button onclick="skipIntro()" class="skip-btn">Skip →</button>
</div>

<div id="static-bg"></div>
<div id="customNotification"></div>

<!-- MODAL -->
<div id="customModal">
    <div class="modal-card">
        <h3 id="modalTitle"></h3>
        <div id="modalInputs"></div>
        <div style="display:flex;gap:8px;margin-top:16px;">
            <button id="modalConfirm" class="btn-main btn-success" style="flex:1;">Confirm</button>
            <button onclick="closeCustomModal()" class="btn-main btn-danger" style="flex:1;">Cancel</button>
        </div>
    </div>
</div>

<!-- PROFILE MODAL -->
<div id="profileModal">
    <div class="profile-modal-card">
        <h3><i class="fas fa-user-circle" style="margin-right:8px;"></i>My Profile</h3>
        <div class="profile-view" id="profileViewMode">
            <div class="profile-view-avatar">
                <img id="profileViewImg" src="" style="display:none;">
                <i class="fas fa-user" id="profileViewIcon" style="color:var(--text-muted);font-size:2.5rem;"></i>
            </div>
            <div class="profile-view-name" id="profileViewName">—</div>
            <div class="profile-view-email" id="profileViewEmail">—</div>
            <div class="profile-info-grid">
                <div class="profile-info-box">
                    <div class="pib-label"><i class="fas fa-building" style="margin-right:4px;font-size:0.6rem;"></i>Business</div>
                    <div class="pib-val" id="profileViewBusiness">—</div>
                </div>
                <div class="profile-info-box">
                    <div class="pib-label"><i class="fas fa-phone" style="margin-right:4px;font-size:0.6rem;"></i>Phone</div>
                    <div class="pib-val" id="profileViewPhone">—</div>
                </div>
            </div>
            <div style="display:flex;gap:8px;">
                <button onclick="switchToEditMode()" class="btn-main btn-purple" style="flex:1;margin-top:0;">
                    <i class="fas fa-edit" style="margin-right:6px;"></i>Edit Profile
                </button>
                <button onclick="closeProfileModal()" class="btn-ghost" style="flex:1;">Close</button>
            </div>
        </div>
        <div class="profile-edit" id="profileEditMode">
            <div class="profile-edit-avatar" onclick="document.getElementById('editProfilePicInput').click()">
                <img id="profileModalImg" src="" style="display:none;">
                <i class="fas fa-user" id="profileModalIcon" style="color:var(--text-muted);font-size:2rem;"></i>
                <div class="edit-overlay"><i class="fas fa-camera"></i></div>
            </div>
            <input type="file" id="editProfilePicInput" accept="image/*" onchange="handleProfilePicChange(this)">
            <div class="upload-progress" id="uploadProgress"><i class="fas fa-spinner fa-spin"></i> Uploading...</div>
            <span class="profile-field-label">Display Name</span>
            <input type="text" id="editDisplayName" placeholder="Your name">
            <span class="profile-field-label">Business Name</span>
            <input type="text" id="editBusinessName" placeholder="Business / Company">
            <span class="profile-field-label">Phone</span>
            <input type="text" id="editPhone" placeholder="+260 ...">
            <div style="display:flex;gap:8px;margin-top:16px;">
                <button onclick="saveProfile()" class="btn-main btn-success" style="flex:1;margin-top:0;">
                    <i class="fas fa-save" style="margin-right:6px;"></i>Save
                </button>
                <button onclick="switchToViewMode()" class="btn-ghost" style="flex:1;">Cancel</button>
            </div>
        </div>
    </div>
</div>

<!-- AUTH -->
<div id="authOverlay">
    <!-- Auth content will be rendered here -->
</div>

<!-- MAIN APP -->
<div id="mainApp" style="display:none;">
    <!-- Main application content will be rendered here -->
</div>

<!-- ============================================
     MODULAR SCRIPT LOADING
     Load scripts in order of dependency
     ============================================ -->

<!-- 1. API Layer - Database and Supabase -->
<script src="js/api/supabase-client.js"></script>
<script src="js/api/db-service.js"></script>

<!-- 2. Services Layer - Authentication -->
<script src="js/services/auth-service.js"></script>

<!-- 3. Business Logic Layer - Calculations and State -->
<script src="js/logic/business-logic.js"></script>
<script src="js/logic/state-manager.js"></script>

<!-- 4. UI Layer - Rendering -->
<script src="js/ui/ui-engine.js"></script>

<!-- 5. Controller - Orchestration -->
<script src="js/app-controller.js"></script>

<!-- 6. Initialize Application -->
<script>
    // Initialize the application when DOM is ready
    document.addEventListener('DOMContentLoaded', async () => {
        try {
            await appController.initialize();
        } catch (error) {
            console.error('Failed to initialize application:', error);
            alert('Failed to initialize application. Please refresh the page.');
        }
    });

    // Global functions for HTML event handlers
    // These are wrappers that delegate to the controller

    async function handleSale(itemId, isDebt) {
        await appController.handleSale(itemId, isDebt);
    }

    function skipIntro() {
        const video = document.getElementById('introVideo');
        if (video) video.pause();
        const splash = document.getElementById('introSplash');
        if (splash) {
            splash.classList.add('hidden');
            setTimeout(() => { splash.style.display = 'none'; }, 800);
        }
    }

    function closeCustomModal() {
        const modal = document.getElementById('customModal');
        if (modal) modal.style.display = 'none';
    }

    function closeProfileModal() {
        const modal = document.getElementById('profileModal');
        if (modal) modal.style.display = 'none';
    }

    function switchToEditMode() {
        const viewMode = document.getElementById('profileViewMode');
        const editMode = document.getElementById('profileEditMode');
        if (viewMode) viewMode.style.display = 'none';
        if (editMode) editMode.style.display = 'block';
    }

    function switchToViewMode() {
        const viewMode = document.getElementById('profileViewMode');
        const editMode = document.getElementById('profileEditMode');
        if (viewMode) viewMode.style.display = 'block';
        if (editMode) editMode.style.display = 'none';
    }

    function handleProfilePicChange(input) {
        if (!input.files[0]) return;
        input._selectedFile = input.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = document.getElementById('profileModalImg');
            if (img) {
                img.src = e.target.result;
                img.style.display = 'block';
            }
            const icon = document.getElementById('profileModalIcon');
            if (icon) icon.style.display = 'none';
        };
        reader.readAsDataURL(input.files[0]);
    }

    async function saveProfile() {
        // Implementation would go here
        appController.uiEngine.showNotification('Profile saved successfully');
    }

    function openProfileModal() {
        const modal = document.getElementById('profileModal');
        if (modal) modal.style.display = 'flex';
    }

    async function payDebt(debtorId) {
        // Implementation would go here
    }

    async function openRestock(itemId) {
        // Implementation would go here
    }

    function sendWhatsAppReminder(debtorId) {
        // Implementation would go here
    }

    async function delP(entryId) {
        appController.stateManager.removePersonalLedgerEntry(entryId);
        await appController.syncUserData();
    }

    async function logoutUser() {
        await authService.signOut();
        location.reload();
    }

    async function resetUserData() {
        // Implementation would go here
    }
</script>

</body>
</html>
